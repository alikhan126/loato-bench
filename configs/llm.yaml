# LLM provider configuration
# Used by: Tier 3 taxonomy mapping (Sprint 2A), LLM baseline evaluation (Sprint 4A)

llm:
  provider: "openai"             # "anthropic" or "openai"
  model: "gpt-4o-mini"           # cheap + fast for Tier 3 taxonomy
  temperature: 0.0
  max_tokens: 50                 # category name only
  max_retries: 5                 # tenacity retry attempts on rate-limit
