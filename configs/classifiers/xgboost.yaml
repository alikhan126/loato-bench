# XGBoost classifier configuration
classifier:
  name: "xgboost"
  class: "promptguard.classifiers.xgb.XGBClassifier"
  hyperparams:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    eval_metric: "logloss"
    tree_method: "hist"
  sweep:
    n_estimators: [100, 300, 500]
    max_depth: [3, 6, 9]
    learning_rate: [0.01, 0.05, 0.1]
